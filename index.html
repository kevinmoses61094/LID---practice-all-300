<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiD Practice 300</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ==============================
       HOME SCREEN
  ============================== -->
  <div id="home-screen" class="screen active">

    <div class="home-header">
      <span class="home-flag">🇩🇪</span>
      <h1>LiD Practice<br>300</h1>
      <p class="subtitle">Leben in Deutschland · Einbürgerungstest</p>
    </div>

    <!-- Saved progress summary -->
    <div class="progress-card">
      <h3>Your Progress</h3>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-number" id="stat-total">—</span>
          <span class="stat-label">Total Questions</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-answered">—</span>
          <span class="stat-label">Answered</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="stat-wrong">—</span>
          <span class="stat-label">Need Review</span>
        </div>
      </div>
    </div>

    <!-- Mode selection -->
    <div class="mode-section">
      <h2>Choose a mode</h2>
      <div class="mode-list">

        <button class="mode-btn selected" data-mode="practice" onclick="selectMode('practice')">
          <span class="mode-icon">📋</span>
          <span class="mode-title">Practice All</span>
          <span class="mode-desc">Go through all questions in order</span>
        </button>

        <button class="mode-btn" data-mode="random" onclick="selectMode('random')">
          <span class="mode-icon">🔀</span>
          <span class="mode-title">Random</span>
          <span class="mode-desc">Questions in a random order</span>
        </button>

        <button class="mode-btn" data-mode="review" onclick="selectMode('review')">
          <span class="mode-icon">🔁</span>
          <span class="mode-title">Review Wrong Answers</span>
          <span class="mode-desc">Practice only questions you got wrong</span>
        </button>

      </div>
    </div>

    <button id="start-btn" class="start-btn" onclick="startQuiz()">Start →</button>

    <!-- Small link to clear saved data -->
    <button onclick="clearProgress()" style="background:none;border:none;color:#aaa;font-size:0.78rem;cursor:pointer;text-align:center;padding:4px;">
      Clear saved progress
    </button>

  </div><!-- /home-screen -->


  <!-- ==============================
       QUIZ SCREEN
  ============================== -->
  <div id="quiz-screen" class="screen">

    <!-- Top bar: home link, mode label, score -->
    <div class="quiz-topbar">
      <button class="home-link" onclick="goHome()">← Home</button>
      <span class="mode-label" id="quiz-mode-label"></span>
      <span class="score-badge" id="score-display">✓ 0</span>
    </div>

    <!-- Progress bar -->
    <div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progress-text">1 / 5</div>
    </div>

    <!-- Question card -->
    <div class="question-card">
      <div class="question-number" id="question-number">Question 1</div>
      <div class="question-text" id="question-text"></div>
    </div>

    <!-- Answer choices (rendered by JS) -->
    <div class="choices-list" id="choices-list"></div>

    <!-- Feedback message after answering -->
    <div class="feedback-msg" id="feedback-msg"></div>

    <!-- Action buttons -->
    <div class="action-row">
      <button class="next-btn" id="next-btn" disabled onclick="nextQuestion()">
        Next →
      </button>
    </div>

  </div><!-- /quiz-screen -->


  <!-- ==============================
       RESULTS SCREEN
  ============================== -->
  <div id="results-screen" class="screen">

    <div class="results-header">
      <span class="results-emoji" id="result-emoji">🎉</span>
      <h2 id="result-headline">Well done!</h2>
      <p id="result-score-detail">0 correct out of 5 questions</p>
    </div>

    <!-- Big score -->
    <div class="results-score-card">
      <div class="big-score" id="result-score-pct">0%</div>
      <div class="score-detail">Score</div>
    </div>

    <!-- Correct / Wrong breakdown -->
    <div class="results-breakdown">
      <div class="breakdown-item">
        <span class="breakdown-num green" id="result-correct">0</span>
        <span class="breakdown-label">Correct ✓</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-num red" id="result-wrong">0</span>
        <span class="breakdown-label">Wrong ✗</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="results-actions">
      <button class="start-btn" onclick="restartSameMode()">Try Again</button>
      <button id="review-btn" class="btn-secondary" onclick="reviewWrong()" style="display:none">
        🔁 Review Wrong Answers
      </button>
      <button class="btn-secondary" onclick="goHome()">← Back to Home</button>
    </div>

  </div><!-- /results-screen -->


  <script src="app.js"></script>
</body>
</html>
