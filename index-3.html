<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiD Practice 300</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1B4FDC" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LiD 300" />
  <link rel="apple-touch-icon" href="icon-192.png" />
</head>
<body>

  <!-- ==============================  HOME SCREEN  ============================== -->
  <div id="home-screen" class="screen active">

    <div class="home-header">
      <span class="home-flag">🇩🇪</span>
      <h1>LiD Practice 300</h1>
      <p class="subtitle">Leben in Deutschland · Einbürgerungstest</p>
    </div>

    <!-- STATE SELECTOR -->
    <div class="section-card" id="state-section">
      <h3 class="section-title">Dein Bundesland</h3>
      <select id="state-select" onchange="onStateChange()" class="state-select">
        <option value="">— Bundesland wählen —</option>
        <option value="BW">Baden-Württemberg</option>
        <option value="BY">Bayern</option>
        <option value="BE">Berlin</option>
        <option value="BB">Brandenburg</option>
        <option value="HB">Bremen</option>
        <option value="HH">Hamburg</option>
        <option value="HE">Hessen</option>
        <option value="MV">Mecklenburg-Vorpommern</option>
        <option value="NI">Niedersachsen</option>
        <option value="NW">Nordrhein-Westfalen</option>
        <option value="RP">Rheinland-Pfalz</option>
        <option value="SL">Saarland</option>
        <option value="SN">Sachsen</option>
        <option value="ST">Sachsen-Anhalt</option>
        <option value="SH">Schleswig-Holstein</option>
        <option value="TH">Thüringen</option>
      </select>
    </div>

    <!-- DASHBOARD -->
    <div class="section-card" id="dashboard">
      <h3 class="section-title">📊 Dein Fortschritt</h3>

      <!-- Average score bar -->
      <div class="dash-avg-row">
        <span class="dash-label">Ø Testergebnis</span>
        <span class="dash-avg-score" id="dash-avg">—</span>
      </div>
      <div class="dash-bar-track">
        <div class="dash-bar-fill" id="dash-bar" style="width:0%"></div>
        <div class="dash-bar-pass" title="Bestehensgrenze 17/33 = 52%"></div>
      </div>
      <div class="dash-bar-legend">
        <span>0</span><span class="pass-label">Bestehen (52%)</span><span>100%</span>
      </div>

      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-number" id="dash-tests">0</span>
          <span class="stat-label">Tests</span>
        </div>
        <div class="stat-item">
          <span class="stat-number green" id="dash-passed">0</span>
          <span class="stat-label">Bestanden</span>
        </div>
        <div class="stat-item">
          <span class="stat-number red" id="dash-failed">0</span>
          <span class="stat-label">Nicht best.</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="dash-wrong">0</span>
          <span class="stat-label">Zum Üben</span>
        </div>
      </div>

      <!-- Recent test history (last 5) -->
      <div id="test-history-wrap" style="display:none">
        <div class="section-title" style="margin-top:14px;margin-bottom:8px">Letzte Tests</div>
        <div id="test-history"></div>
      </div>
    </div>

    <!-- MODE SELECTION -->
    <div class="section-card">
      <h3 class="section-title">Modus wählen</h3>
      <div class="mode-list">

        <button class="mode-btn" data-mode="sample" onclick="selectMode('sample')">
          <span class="mode-icon">📝</span>
          <span class="mode-title">Probetest (33 Fragen)</span>
          <span class="mode-desc">Echter Test — wie beim BAMF</span>
        </button>

        <button class="mode-btn selected" data-mode="practice" onclick="selectMode('practice')">
          <span class="mode-icon">📋</span>
          <span class="mode-title">Alle üben</span>
          <span class="mode-desc">Alle 300 Fragen der Reihe nach</span>
        </button>

        <button class="mode-btn" data-mode="random" onclick="selectMode('random')">
          <span class="mode-icon">🔀</span>
          <span class="mode-title">Zufallsmodus</span>
          <span class="mode-desc">Zufällige Reihenfolge</span>
        </button>

        <button class="mode-btn" data-mode="review" onclick="selectMode('review')">
          <span class="mode-icon">🔁</span>
          <span class="mode-title">Falsche wiederholen</span>
          <span class="mode-desc">Nur falsch beantwortete Fragen</span>
        </button>

      </div>

      <!-- Sample test picker (shown only in sample mode) -->
      <div id="test-picker" style="display:none; margin-top:12px">
        <select id="test-number-select" class="state-select">
          <!-- filled by JS -->
        </select>
      </div>
    </div>

    <button id="start-btn" class="start-btn" onclick="startQuiz()">Start →</button>

    <button onclick="clearProgress()" style="background:none;border:none;color:#bbb;font-size:0.76rem;cursor:pointer;text-align:center;padding:6px;margin-bottom:24px;">
      Fortschritt zurücksetzen
    </button>

  </div><!-- /home-screen -->


  <!-- ==============================  QUIZ SCREEN  ============================== -->
  <div id="quiz-screen" class="screen">

    <div class="quiz-topbar">
      <button class="home-link" onclick="goHome()">← Home</button>
      <span class="mode-label" id="quiz-mode-label"></span>
      <span class="score-badge" id="score-display">✓ 0</span>
    </div>

    <div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progress-text">1 / 33</div>
    </div>

    <!-- Timer (shown in sample test mode) -->
    <div id="timer-bar" style="display:none">
      <span id="timer-display" class="timer-display">60:00</span>
    </div>

    <div class="question-card">
      <div class="question-number" id="question-number">Frage 1</div>
      <div class="question-text" id="question-text"></div>
    </div>

    <div class="choices-list" id="choices-list"></div>
    <div class="feedback-msg" id="feedback-msg"></div>

    <div class="action-row">
      <button class="next-btn" id="next-btn" disabled onclick="nextQuestion()">Weiter →</button>
    </div>

  </div><!-- /quiz-screen -->


  <!-- ==============================  RESULTS SCREEN  ============================== -->
  <div id="results-screen" class="screen">

    <div class="results-header">
      <span class="results-emoji" id="result-emoji">🎉</span>
      <h2 id="result-headline">Gut gemacht!</h2>
      <p id="result-score-detail"></p>
    </div>

    <!-- Pass/Fail badge (sample test only) -->
    <div id="pass-fail-badge" style="display:none" class="pass-fail-badge"></div>

    <div class="results-score-card">
      <div class="big-score" id="result-score-pct">0%</div>
      <div class="score-detail" id="result-score-label">Ergebnis</div>
    </div>

    <div class="results-breakdown">
      <div class="breakdown-item">
        <span class="breakdown-num green" id="result-correct">0</span>
        <span class="breakdown-label">Richtig ✓</span>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-num red" id="result-wrong">0</span>
        <span class="breakdown-label">Falsch ✗</span>
      </div>
    </div>

    <div class="results-actions">
      <button class="start-btn" onclick="restartSameMode()">Nochmal versuchen</button>
      <button id="review-btn" class="btn-secondary" onclick="reviewWrong()" style="display:none">
        🔁 Falsche wiederholen
      </button>
      <button class="btn-secondary" onclick="goHome()">← Zurück zur Startseite</button>
    </div>

  </div><!-- /results-screen -->


  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
